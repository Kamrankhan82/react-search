<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SearchTap Shopify Search</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&display=swap');

        html {
            box-sizing: border-box;
            font-size: 62.5%;
        }

        body {
            color: #606c76;
            font-size: 1.6em;
            font-weight: 300;
            letter-spacing: 0.01em;
            line-height: 1.6;
            font-family: 'Hind', sans-serif;
        }

        /*to enable body scroll and disable window scroll*/
        /*
        html {
            overflow-y: hidden;
            height: 100%;
        }

        body {
            overflow-y: scroll;
            height: 100%;
        }
        */

        .container {
            margin: 0 auto;
            max-width: 112rem;
            padding: 0 2rem;
            position: relative;
            width: 100%;
        }

        #header-nav {
            background: #eee;
            width: 100%;
            height: 100px;
        }

        #search {
            position: absolute;
            margin: 0 auto;
            right: 8rem;
            top: 4rem;
            font-size: 16px;
            padding: 1rem;
        }

        @media only screen and (min-width: 769px) {
            #search {
                right: 15rem;
                top: 3rem;
                width: 30rem;
            }
        }

        @media only screen and (max-width: 769px) {
            .container {
                padding: 0;
            }
        }
    </style>
</head>
<body>
<div id="header-nav">
    <input
            type="text"
            name="q"
            id="search"
            autocomplete="off"
            placeholder="Search here..."
    />
    <div id="st-autocomplete-container"></div>
</div>

<div id="st-search-container" class="container"></div>
<main id="MainContent">
    <div class="container" style="padding: 0 1rem"></div>
</main>
<div class="st-search"></div>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
